# ── SARIMAX Parameters ───────────────────────────────────────
sarimax:
  max_p: 3
  max_d: 2
  max_q: 3
  max_P: 2
  max_D: 1
  max_Q: 2
  m: 12                    # Seasonality period (monthly)
  information_criterion: "aic"
  stepwise: true
  n_fits: 50
  cv_folds: 5              # Rolling-window cross-validation folds

# ── VECM Parameters ──────────────────────────────────────────
vecm:
  max_lags: 12
  deterministic: "ci"      # Cointegration with intercept
  seasons: 4

# ── GARCH Parameters ─────────────────────────────────────────
garch:
  mean_model: "AR"
  vol_model: "GARCH"
  p: 1
  q: 1
  dist: "skewt"            # Skewed student-t distribution
  egarch: true             # Also fit EGARCH for asymmetry

# ── Machine Learning ─────────────────────────────────────────
ml:
  test_size: 0.2
  forecast_horizon: 12     # Months
  random_state: 42
  lstm:
    lookback: 60           # Days
    units: 64
    dropout: 0.2
    epochs: 100
    batch_size: 32

# ── Statistical Tests ────────────────────────────────────────
tests:
  significance_level: 0.05
  adf_max_lags: 20
  granger_max_lags: 12
  johansen_det_order: 0    # -1=no deterministic, 0=constant
  johansen_k_ar_diff: 1

# ── Paths ─────────────────────────────────────────────────────
paths:
  raw_data: "data/raw"
  processed_data: "data/processed"
  results_figures: "results/figures"
  results_tables: "results/tables"
