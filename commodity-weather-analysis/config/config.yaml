# ============================================================
# Commodity Weather Analysis — Configuration
# ============================================================

project:
  name: "Commodity Price & Weather Impact Analysis"
  version: "2.0.0"
  start_date: "1973-01-01"
  end_date: "2024-12-31"

# ── Commodity Pairs ──────────────────────────────────────────
commodity_pairs:
  - name: "Corn/Oats"
    base: "CORN"
    quote: "OATS"
    category: "grain"
  - name: "Wheat/Soybean"
    base: "WHEAT"
    quote: "SOYBEAN"
    category: "grain"
  - name: "Coffee/Cocoa"
    base: "COFFEE"
    quote: "COCOA"
    category: "soft"
  - name: "Gold/Silver"
    base: "GOLD"
    quote: "SILVER"
    category: "metal"

